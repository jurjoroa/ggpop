url: https://jurjoroa.github.io/ggpop/
title: "ggpop"

home:
  description: >
    ggpop is an R package for creating icon-based population charts and pictogram
    plots with ggplot2. Use geom_pop() and geom_icon_point() to visualize proportion
    and population data with 2,000+ Font Awesome icons. Free and open-source (MIT).

template:
  params:
      ganalytics: G-CX1ZY99J1P
  bootstrap: 5
  bslib:
    bg: "#01394f"
    fg: "white"
    primary: "#FF6B6B"
  assets: pkgdown/assets
  opengraph:
    image:
      src: https://jurjoroa.github.io/ggpop/inst/figures/shp.png
      alt: "ggpop - icon-based population charts for R"
    twitter:
      creator: "@jorgeroac"
      card: summary_large_image
  includes:
    in_header: |
      <meta name="google-site-verification" content="Y0JD9ENIbUfNCI5IFajFZDvfyiSmT9I2JNkYj_s7Nhg">
      <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "ggpop",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "R",
        "softwareVersion": "1.7.0",
        "description": "R package for creating icon-based population charts and pictogram plots with ggplot2. Visualize proportion and population data in R",
        "url": "https://jurjoroa.github.io/ggpop/",
        "downloadUrl": "https://cran.r-project.org/package=ggpop",
        "license": "https://opensource.org/licenses/MIT",
        "author": [
          {"@type": "Person", "name": "Jorge A. Roa-Contreras"},
          {"@type": "Person", "name": "Ralitza Soultanova"},
          {"@type": "Person", "name": "Fernando Alarid-Escudero"},
          {"@type": "Person", "name": "Carlos Pineda-Antunez"}
        ]
      }
      </script>
    after_body: |
      <script>
      (function () {
        var STORAGE_KEY = 'ggpop-theme';
        var theme = localStorage.getItem(STORAGE_KEY) || 'light';
        document.documentElement.setAttribute('data-bs-theme', theme);

        /* Enable transitions after first paint — prevents flash on page load */
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            document.documentElement.classList.add('theme-ready');
          });
        });

        function updateBtn(t) {
          var icon = document.querySelector('#ggpop-theme-btn .theme-icon');
          if (!icon) return;
          /* t='light' = dark mode active → show sun (click to go light)
             t='dark'  = light mode active → show moon (click to go dark) */
          icon.className = 'fa theme-icon ' + (t === 'light' ? 'fa-sun' : 'fa-moon');
        }

        function inject() {
          var navRight = document.querySelector('.navbar-nav.ms-auto')
                      || document.querySelector('.navbar-right')
                      || document.querySelector('.navbar-nav:last-of-type');
          if (!navRight) return;
          var li = document.createElement('li');
          li.className = 'nav-item d-flex align-items-center ms-2';
          li.innerHTML = '<button id="ggpop-theme-btn" class="theme-switch" aria-label="Toggle theme">'
            + '<span class="theme-switch-track">'
            + '<span class="theme-switch-thumb"><i class="fa theme-icon fa-sun"></i></span>'
            + '</span></button>';
          navRight.appendChild(li);
          updateBtn(theme);
          document.getElementById('ggpop-theme-btn').addEventListener('click', function () {
            var cur = document.documentElement.getAttribute('data-bs-theme');
            var next = cur === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-bs-theme', next);
            localStorage.setItem(STORAGE_KEY, next);
            updateBtn(next);
          });
        }

        document.readyState === 'loading'
          ? document.addEventListener('DOMContentLoaded', inject)
          : inject();
      })();
      </script>

